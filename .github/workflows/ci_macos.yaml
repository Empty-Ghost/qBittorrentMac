name: CI - macOS

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      sign_release:
        description: Sign, notarize, and staple release artifacts
        required: true
        type: boolean
        default: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.head_ref != '' }}

jobs:
  ci:
    name: Build
    runs-on: macos-26
    permissions:
      actions: write

    strategy:
      fail-fast: false
      matrix:
        libtorrent:
          - version: "2.1.0"
            commit: "578e06824c3546f3371ab43967ab288a7e253eca"
            boost_major_version: "1"
            boost_minor_version: "91"
            boost_patch_version: "0"
            libt_build_flags: "-Dwebtorrent=ON"
        qbt_gui: ["GUI=ON", "GUI=OFF"]
        qt_version: ["6.11.1"]

    env:
      boost_path: "${{ github.workspace }}/../boost"
      libtorrent_path: "${{ github.workspace }}/../libtorrent"
      libtorrent_install_path: "${{ runner.temp }}/qbt-dependencies/libtorrent"
      OPENSSL_ROOT_DIR: "${{ runner.temp }}/qbt-dependencies/openssl"
      ZLIB_ROOT: "${{ runner.temp }}/qbt-dependencies/zlib"
      CMAKE_VERSION: "4.4.0"
      NINJA_VERSION: "1.13.2"
      CCACHE_VERSION: "4.13.6"
      SYFT_VERSION: "1.48.0"
      OPENSSL_VERSION: "3.5.7"
      ZLIB_VERSION: "1.3.2"
      MACOSX_DEPLOYMENT_TARGET: "26.0"
      SIGN_RELEASE: ${{ (github.event_name == 'workflow_dispatch') && inputs.sign_release && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify macOS build host
        run: |
          test "$(uname -m)" = "arm64"
          test "$(sw_vers -productVersion | cut -d. -f1)" = "26"
          test "$(xcodebuild -version | awk '/^Xcode / { split($2, version, "."); print version[1] }')" = "26"

      - name: Install pinned build tools
        run: |
          tools_dir="${RUNNER_TEMP}/qbt-build-tools"
          mkdir -p "$tools_dir/bin" "$tools_dir/extract"

          curl --fail --location --retry 3 \
            --output "$tools_dir/cmake-macos-universal.tar.gz" \
            "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-macos-universal.tar.gz"
          echo "09d6382059aa1b986b25fd1809459f5eb3da6a1ab342d44d6084265f38541397  $tools_dir/cmake-macos-universal.tar.gz" \
            | shasum -a 256 -c -
          tar -xzf "$tools_dir/cmake-macos-universal.tar.gz" -C "$tools_dir/extract"
          cmake_bin_dir="$tools_dir/extract/cmake-${CMAKE_VERSION}-macos-universal/CMake.app/Contents/bin"

          curl --fail --location --retry 3 \
            --output "$tools_dir/ninja-mac.zip" \
            "https://github.com/ninja-build/ninja/releases/download/v${NINJA_VERSION}/ninja-mac.zip"
          echo "c99048673aa765960a99cf10c6ddb9f1fad506099ff0a0e137ad8960a88f321b  $tools_dir/ninja-mac.zip" \
            | shasum -a 256 -c -
          unzip -q "$tools_dir/ninja-mac.zip" -d "$tools_dir/extract/ninja"
          install -m 0755 "$tools_dir/extract/ninja/ninja" "$tools_dir/bin/ninja"

          curl --fail --location --retry 3 \
            --output "$tools_dir/ccache-darwin.tar.gz" \
            "https://github.com/ccache/ccache/releases/download/v${CCACHE_VERSION}/ccache-${CCACHE_VERSION}-darwin.tar.gz"
          echo "0274210ec9c9936ed5711d59b0de3167a51216a588ddde35f6bc828f366fe6d9  $tools_dir/ccache-darwin.tar.gz" \
            | shasum -a 256 -c -
          tar -xzf "$tools_dir/ccache-darwin.tar.gz" -C "$tools_dir/extract"
          install -m 0755 \
            "$tools_dir/extract/ccache-${CCACHE_VERSION}-darwin/ccache" \
            "$tools_dir/bin/ccache"

          curl --fail --location --retry 3 \
            --output "$tools_dir/syft-darwin.tar.gz" \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_darwin_arm64.tar.gz"
          echo "fef3e6d5df336a0a4c3e421e503119d1e221cf82a3ef5e426a791fcd81667e87  $tools_dir/syft-darwin.tar.gz" \
            | shasum -a 256 -c -
          tar -xzf "$tools_dir/syft-darwin.tar.gz" -C "$tools_dir/bin" syft
          chmod 0755 "$tools_dir/bin/syft"

          echo "$cmake_bin_dir" >> "$GITHUB_PATH"
          echo "$tools_dir/bin" >> "$GITHUB_PATH"
          test "$("$cmake_bin_dir/cmake" --version | head -n 1)" = "cmake version $CMAKE_VERSION"
          test "$("$tools_dir/bin/ninja" --version)" = "$NINJA_VERSION"
          test "$("$tools_dir/bin/ccache" --version | head -n 1)" = "ccache version $CCACHE_VERSION"
          "$tools_dir/bin/syft" version | grep -F "Version:       $SYFT_VERSION"

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@802ec72ba1d54bbf75c52f45367253d6abec30f5 # v1.5.8
        with:
          install_ccache: false
          store_cache: ${{ (github.repository != 'qbittorrent/qBittorrent') || (github.ref == 'refs/heads/master') }}
          update_packager_index: false
          ccache_options: |
            max_size=1G

      - name: Build pinned OpenSSL and zlib
        run: |
          dependencies_dir="${RUNNER_TEMP}/qbt-dependencies"
          sources_dir="${RUNNER_TEMP}/qbt-dependency-sources"
          mkdir -p "$dependencies_dir" "$sources_dir/openssl" "$sources_dir/zlib"

          curl --fail --location --retry 3 \
            --output "$sources_dir/openssl.tar.gz" \
            "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          echo "a8c0d28a529ca480f9f36cf5792e2cd21984552a3c8e4aa11a24aa31aeac98e8  $sources_dir/openssl.tar.gz" \
            | shasum -a 256 -c -
          tar -xzf "$sources_dir/openssl.tar.gz" -C "$sources_dir/openssl" --strip-components=1

          pushd "$sources_dir/openssl"
          ./Configure darwin64-arm64-cc no-shared no-module no-tests \
            --prefix="$OPENSSL_ROOT_DIR" \
            --openssldir="$OPENSSL_ROOT_DIR/ssl" \
            -mmacosx-version-min="$MACOSX_DEPLOYMENT_TARGET"
          make -s -j"$(sysctl -n hw.logicalcpu)"
          make -s install_sw
          popd
          test "$("$OPENSSL_ROOT_DIR/bin/openssl" version | awk '{print $2}')" = "$OPENSSL_VERSION"
          "$OPENSSL_ROOT_DIR/bin/openssl" list -providers | grep -F "OpenSSL Default Provider"

          curl --fail --location --retry 3 \
            --output "$sources_dir/zlib.tar.gz" \
            "https://zlib.net/zlib-${ZLIB_VERSION}.tar.gz"
          echo "bb329a0a2cd0274d05519d61c667c062e06990d72e125ee2dfa8de64f0119d16  $sources_dir/zlib.tar.gz" \
            | shasum -a 256 -c -
          tar -xzf "$sources_dir/zlib.tar.gz" -C "$sources_dir/zlib" --strip-components=1
          cmake \
            -S "$sources_dir/zlib" \
            -B "$sources_dir/zlib-build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$ZLIB_ROOT" \
            -DCMAKE_MAKE_PROGRAM="${RUNNER_TEMP}/qbt-build-tools/bin/ninja" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET" \
            -DZLIB_BUILD_SHARED=OFF \
            -DZLIB_BUILD_STATIC=ON \
            -DZLIB_BUILD_TESTING=OFF
          cmake --build "$sources_dir/zlib-build" --parallel
          cmake --install "$sources_dir/zlib-build"
          test -f "$OPENSSL_ROOT_DIR/lib/libcrypto.a"
          test -f "$OPENSSL_ROOT_DIR/lib/libssl.a"
          test -f "$ZLIB_ROOT/lib/libz.a"

      - name: Install boost
        run: |
          boost_url="https://archives.boost.io/release/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/source/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          boost_url2="https://sourceforge.net/projects/boost/files/boost/${{ matrix.libtorrent.boost_major_version }}.${{ matrix.libtorrent.boost_minor_version }}.${{ matrix.libtorrent.boost_patch_version }}/boost_${{ matrix.libtorrent.boost_major_version }}_${{ matrix.libtorrent.boost_minor_version }}_${{ matrix.libtorrent.boost_patch_version }}.tar.gz"
          set +e
          curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url"
          echo "5734305f40a76c30f951c9abd409a45a2a19fb546efe4162119250bbe4d3a463  ${{ runner.temp }}/boost.tar.gz" | shasum -a 256 -c - \
            && tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."
          _exitCode="$?"
          if [ "$_exitCode" -ne "0" ]; then
            curl -L -o "${{ runner.temp }}/boost.tar.gz" "$boost_url2"
            echo "5734305f40a76c30f951c9abd409a45a2a19fb546efe4162119250bbe4d3a463  ${{ runner.temp }}/boost.tar.gz" | shasum -a 256 -c - \
              && tar -xf "${{ runner.temp }}/boost.tar.gz" -C "${{ github.workspace }}/.."
            _exitCode="$?"
          fi
          test "$_exitCode" -eq "0"
          mv "${{ github.workspace }}/.."/boost_* "${{ env.boost_path }}"
          cd "${{ env.boost_path }}"
          ./bootstrap.sh
          ./b2 stage --stagedir=./ --with-headers

      - name: Setup Python for Qt installer
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.6"

      - name: Prepare Qt archive verification
        run: mkdir -p "${{ runner.temp }}/qt-archives"

      - name: Install Qt
        uses: jurplel/install-qt-action/action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ matrix.qt_version }}
          archives: qtbase qtdeclarative qtsvg qttools
          modules: qtimageformats
          # Not sure why Qt made a hard dependency on qtdeclarative, try removing it when Qt > 6.4.0
          cache: false
          aqtversion: "==3.3.0"
          py7zrversion: "==1.1.3"
          extra: "--keep --archive-dest ${{ runner.temp }}/qt-archives"

      - name: Verify Qt archives
        working-directory: ${{ runner.temp }}/qt-archives
        run: shasum -a 256 -c "${{ github.workspace }}/.github/workflows/helper/qt-6.11.1-macos.sha256"

      - name: Install libtorrent
        run: |
          git clone \
            --branch v${{ matrix.libtorrent.version }} \
            --depth 1 \
            --recurse-submodules \
            https://github.com/arvidn/libtorrent.git \
            ${{ env.libtorrent_path }}
          cd ${{ env.libtorrent_path }}
          test "$(git rev-parse HEAD)" = "${{ matrix.libtorrent.commit }}"
          cmake \
            -B build \
            -G "Ninja" \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=TRUE \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_INSTALL_PREFIX="${{ env.libtorrent_install_path }}" \
            -DCMAKE_MAKE_PROGRAM="${RUNNER_TEMP}/qbt-build-tools/bin/ninja" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET" \
            -DBoost_DIR="${{ env.boost_path }}/lib/cmake/Boost-1.91.0" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            -DOPENSSL_USE_STATIC_LIBS=TRUE \
            -Ddeprecated-functions=OFF \
            ${{ matrix.libtorrent.libt_build_flags }}
          cmake --build build
          cmake --install build

      - name: Build qBittorrent
        run: |
          CXXFLAGS="$CXXFLAGS -DQT_FORCE_ASSERTS -Werror -Wno-error=deprecated-declarations -Wno-error=deprecated-literal-operator" \
          LDFLAGS="$LDFLAGS -gz" \
          cmake \
            -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=TRUE \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_MAKE_PROGRAM="${RUNNER_TEMP}/qbt-build-tools/bin/ninja" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET" \
            -DBoost_DIR="${{ env.boost_path }}/lib/cmake/Boost-1.91.0" \
            -DCMAKE_PREFIX_PATH="${{ env.libtorrent_install_path }}" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            -DOPENSSL_USE_STATIC_LIBS=TRUE \
            -DZLIB_ROOT="$ZLIB_ROOT" \
            -DZLIB_USE_STATIC_LIBS=ON \
            -DTESTING=ON \
            -DVERBOSE_CONFIGURE=ON \
            -D${{ matrix.qbt_gui }}
          cmake --build build --target qbt_update_translations
          cmake --build build
          cmake --build build --target check
          if [ "${{ matrix.qbt_gui }}" = "GUI=ON" ]; then
            build/qbittorrent.app/Contents/MacOS/qbittorrent -v
          else
            build/qbittorrent-nox.app/Contents/MacOS/qbittorrent-nox -v
          fi

      - name: Import Apple signing certificate
        if: env.SIGN_RELEASE == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          test -n "$MACOS_CERTIFICATE_P12"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$MACOS_SIGNING_IDENTITY"

          signing_dir="${RUNNER_TEMP}/qbt-signing"
          keychain_path="${RUNNER_TEMP}/qbt-signing.keychain-db"
          keychain_password="$(uuidgen)$(uuidgen)"
          mkdir -m 0700 "$signing_dir"
          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$signing_dir/certificate.p12"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$signing_dir/certificate.p12" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -F "$MACOS_SIGNING_IDENTITY"

          echo "::add-mask::$keychain_password"
          echo "QBT_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "QBT_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Prepare build artifacts
        run: |
          appName="qbittorrent"
          if [ "${{ matrix.qbt_gui }}" = "GUI=OFF" ]; then
            appName="qbittorrent-nox"
          fi
          pushd build
          # packaging
          macdeployqt "$appName.app" -no-strip
          # Qt distributes universal macOS archives. Keep only the arm64 slice
          # in copied frameworks and plugins before validation and signing.
          while IFS= read -r -d '' bundle_file; do
            if ! file "$bundle_file" | grep -q "Mach-O"; then
              continue
            fi

            architectures="$(lipo -archs "$bundle_file")"
            if [ "$architectures" != "arm64" ]; then
              permissions="$(stat -f '%Lp' "$bundle_file")"
              lipo "$bundle_file" -thin arm64 -output "$bundle_file.arm64"
              chmod "$permissions" "$bundle_file.arm64"
              mv "$bundle_file.arm64" "$bundle_file"
            fi
          done < <(find "$appName.app" -type f -print0)
          # Verify that the bundle is self-contained and arm64-only, and that
          # bundled binaries do not require a newer macOS release than the app.
          mach_o_count=0
          while IFS= read -r -d '' bundle_file; do
            if ! file "$bundle_file" | grep -q "Mach-O"; then
              continue
            fi

            mach_o_count=$((mach_o_count + 1))
            architectures="$(lipo -archs "$bundle_file")"
            if [ "$architectures" != "arm64" ]; then
              echo "$bundle_file has unsupported architectures: $architectures" >&2
              exit 1
            fi
            if otool -L "$bundle_file" | grep -E '/opt/homebrew|/usr/local'; then
              echo "External package-manager dependency found in $bundle_file" >&2
              exit 1
            fi
            permissions="$(stat -f '%Lp' "$bundle_file")"
            if (( (8#$permissions & 022) != 0 )); then
              echo "$bundle_file is group- or world-writable: $permissions" >&2
              exit 1
            fi

            while IFS= read -r minimum_version; do
              if ! awk -v version="$minimum_version" 'BEGIN {
                split(version, actual, ".")
                exit !((actual[1] < 26) || ((actual[1] == 26) && (actual[2] == 0)))
              }'; then
                echo "$bundle_file requires macOS $minimum_version, above the 26.0 target" >&2
                exit 1
              fi
            done < <(otool -l "$bundle_file" | awk '
              $1 == "cmd" { command = $2 }
              command == "LC_BUILD_VERSION" && $1 == "minos" { print $2 }
              command == "LC_VERSION_MIN_MACOSX" && $1 == "version" { print $2 }
            ')
          done < <(find "$appName.app" -type f -print0)
          test "$mach_o_count" -gt 0
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$appName.app/Contents/Info.plist")" = "$MACOSX_DEPLOYMENT_TARGET"
          test "$(otool -l "$appName.app/Contents/MacOS/$appName" | awk '
            $1 == "cmd" { command = $2 }
            command == "LC_BUILD_VERSION" && $1 == "minos" { print $2; exit }
            command == "LC_VERSION_MIN_MACOSX" && $1 == "version" { print $2; exit }
          ')" = "$MACOSX_DEPLOYMENT_TARGET"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$appName.app/Contents/Info.plist")" = "org.qbittorrent.qBittorrent"
          if [ "${{ matrix.qbt_gui }}" = "GUI=ON" ]; then
            test -f "$appName.app/Contents/PlugIns/platforms/libqcocoa.dylib"
            find "$appName.app/Contents/translations" -type f -name '*.qm' -print -quit | grep -q .
          fi

          # Sign nested code before the containing frameworks and app bundle.
          xattr -cr "$appName.app"
          signing_args=(--force --options runtime)
          if [ "$SIGN_RELEASE" = "true" ]; then
            signing_args+=(--timestamp --keychain "$QBT_SIGNING_KEYCHAIN" --sign "$QBT_SIGNING_IDENTITY")
          else
            signing_args+=(--timestamp=none --sign -)
          fi
          while IFS= read -r -d '' bundle_file; do
            if file "$bundle_file" | grep -q "Mach-O"; then
              codesign "${signing_args[@]}" "$bundle_file"
            fi
          done < <(find "$appName.app/Contents" -type f -print0)
          while IFS= read -r -d '' framework; do
            codesign "${signing_args[@]}" "$framework"
          done < <(find "$appName.app/Contents/Frameworks" -type d -name '*.framework' -print0)
          codesign "${signing_args[@]}" "$appName.app"
          codesign --verify --deep --strict -v "$appName.app"
          codesign -dv --verbose=4 "$appName.app" 2>&1 | grep -E 'flags=.*runtime'
          codesign -d --entitlements - "$appName.app" > "$RUNNER_TEMP/qbt-entitlements.plist"
          test ! -s "$RUNNER_TEMP/qbt-entitlements.plist"
          if [ "$SIGN_RELEASE" = "true" ]; then
            codesign -dv --verbose=4 "$appName.app" 2>&1 | grep -E '^Timestamp='
            codesign -dv --verbose=4 "$appName.app" 2>&1 | grep -F "Authority=$QBT_SIGNING_IDENTITY"
          fi
          # create .dmg
          PACKAGE_RETRY=0
          while [ "$PACKAGE_RETRY" -lt "3" ]; do
            if hdiutil create -fs HFS+ -srcfolder "$appName.app" -volname "$appName" "$appName.dmg"; then
              break
            fi
            sleep 5
            PACKAGE_RETRY=$((PACKAGE_RETRY + 1))
            echo "Retry $PACKAGE_RETRY..."
          done
          test -f "$appName.dmg"
          popd
          # prepare upload folder
          mkdir upload
          cp "build/$appName.dmg" upload
          mkdir upload/cmake
          cp build/compile_commands.json upload/cmake
          mkdir upload/cmake/libtorrent
          cp ${{ env.libtorrent_path }}/build/compile_commands.json upload/cmake/libtorrent
          appVersion="$(/usr/libexec/PlistBuddy \
            -c "Print :CFBundleShortVersionString" \
            "build/$appName.app/Contents/Info.plist")"
          syft scan "dir:build/$appName.app" \
            --source-name "$appName" \
            --source-version "$appVersion" \
            --output "cyclonedx-json=upload/$appName.cdx.json"

      - name: Notarize and staple release artifact
        if: env.SIGN_RELEASE == 'true'
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          test -n "$APPLE_NOTARY_KEY"
          test -n "$APPLE_NOTARY_KEY_ID"
          test -n "$APPLE_NOTARY_ISSUER_ID"

          appName="qbittorrent"
          if [ "${{ matrix.qbt_gui }}" = "GUI=OFF" ]; then
            appName="qbittorrent-nox"
          fi
          printf '%s' "$APPLE_NOTARY_KEY" | base64 -D > "$RUNNER_TEMP/qbt-signing/AuthKey.p8"
          chmod 0600 "$RUNNER_TEMP/qbt-signing/AuthKey.p8"

          codesign --force --timestamp \
            --keychain "$QBT_SIGNING_KEYCHAIN" \
            --sign "$QBT_SIGNING_IDENTITY" \
            "build/$appName.dmg"
          codesign --verify --strict --verbose=2 "build/$appName.dmg"
          xcrun notarytool submit "build/$appName.dmg" \
            --key "$RUNNER_TEMP/qbt-signing/AuthKey.p8" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait \
            --timeout 30m
          xcrun stapler staple --verbose "build/$appName.dmg"
          xcrun stapler validate --verbose "build/$appName.dmg"
          spctl --assess --type open --context context:primary-signature --verbose=2 "build/$appName.dmg"
          cp "build/$appName.dmg" upload

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qBittorrent-CI_macOS_${{ matrix.qbt_gui }}_libtorrent-${{ matrix.libtorrent.version }}_Qt-${{ matrix.qt_version }}
          path: upload

      - name: Remove Apple signing credentials
        if: always() && env.SIGN_RELEASE == 'true'
        run: |
          security delete-keychain "${RUNNER_TEMP}/qbt-signing.keychain-db" || true
          rm -f \
            "${RUNNER_TEMP}/qbt-signing/certificate.p12" \
            "${RUNNER_TEMP}/qbt-signing/AuthKey.p8"
